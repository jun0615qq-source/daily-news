<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── 기본 메타 ─────────────────────────────────────────────────────── -->
    <title>데일리 뉴스 | Daily News</title>
    <meta name="description" content="신뢰할 수 있는 출처의 오늘 뉴스를 카드로 빠르게 확인하세요" />
    <meta name="keywords" content="뉴스, 데일리뉴스, 카드뉴스, 정치, 경제, IT, 스포츠" />
    <meta name="author" content="데일리 뉴스" />
    <meta name="robots" content="index, follow" />

    <!-- ── PWA 필수 ──────────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1B3A6B" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#C9A84C" media="(prefers-color-scheme: light)" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── iOS Safari PWA ───────────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="데일리뉴스" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />

    <!-- iOS 스플래시 스크린 (iPhone 14 Pro 기준) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- ── Open Graph (카카오/네이버 공유 미리보기) ─────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="데일리 뉴스" />
    <meta property="og:description" content="오늘의 주요 뉴스를 카드로 빠르게 확인하세요" />
    <meta property="og:image"       content="/icons/icon-512.png" />
    <meta property="og:locale"      content="ko_KR" />

    <!-- ── 아이콘 ─────────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />

    <!-- ── 폰트 (최적화: display=swap으로 FOUT 방지) ────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />

    <!-- ── Google AdSense (퍼블리셔 ID 입력 후 주석 해제) ────────────────── -->
    <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script> -->

    <!-- ── 스플래시 배경색 (앱 로딩 중 흰 화면 방지) ────────────────────── -->
    <style>
      html { background-color: #FAF7F0; }
      @media (prefers-color-scheme: dark) { html { background-color: #050D18; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
